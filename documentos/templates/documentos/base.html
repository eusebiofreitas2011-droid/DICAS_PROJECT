<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DICAS{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .badge-A_PROCESSAR { background-color: #0dcaf0; color: #000; }
    .badge-A_VALIDAR   { background-color: #ffc107; color: #000; }
    .badge-VALIDADO    { background-color: #198754; }
    .badge-ERRO        { background-color: #dc3545; }
    .card { box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'documentos:lista' %}">
        <i class="bi bi-file-earmark-text"></i> DICAS
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="{% url 'documentos:upload' %}">
          <i class="bi bi-upload"></i> Novo Documento
        </a>
        <a class="nav-link" href="{% url 'documentos:lista' %}">
          <i class="bi bi-list-ul"></i> Documentos
        </a>
        <a class="nav-link" href="/admin/">
          <i class="bi bi-gear"></i> Admin
        </a>
      </div>
    </div>
  </nav>

  <div class="container mb-5">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
