<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DICAS{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0f1117;
      --surface1:  #161b27;
      --surface2:  #1e2535;
      --accent:    #3d7fff;
      --green:     #00c9a7;
      --danger:    #ff5c6e;
      --warning:   #f0a732;
      --border:    #252d3e;
      --text:      #e2e8f0;
      --muted:     #7b8ba8;
      --radius:    10px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
    }

    code, pre, .mono {
      font-family: 'DM Mono', monospace;
    }

    /* Navbar */
    .navbar {
      background-color: var(--surface1) !important;
      border-bottom: 1px solid var(--border);
    }
    .navbar-brand {
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--accent) !important;
    }
    .nav-link {
      color: var(--muted) !important;
      font-weight: 500;
    }
    .nav-link:hover { color: var(--text) !important; }

    /* Cards */
    .card {
      background-color: var(--surface1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: none;
    }
    .card-header {
      background-color: var(--surface2);
      border-bottom: 1px solid var(--border);
      color: var(--text);
      font-weight: 600;
    }
    .card-footer {
      background-color: var(--surface2);
      border-top: 1px solid var(--border);
      color: var(--muted);
    }

    /* Tabela */
    .table {
      color: var(--text);
      --bs-table-bg: transparent;
      --bs-table-hover-bg: rgba(61,127,255,.06);
      --bs-table-border-color: var(--border);
    }
    .table thead th {
      background-color: var(--surface2);
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 1px solid var(--border);
    }
    .table td { border-color: var(--border); vertical-align: middle; }

    /* Badges de estado */
    .badge-A_PROCESSAR { background-color: var(--accent);  color: #fff; }
    .badge-A_VALIDAR   { background-color: var(--warning); color: #000; }
    .badge-VALIDADO    { background-color: var(--green);   color: #000; }
    .badge-ERRO        { background-color: var(--danger);  color: #fff; }

    /* Botões */
    .btn-primary, .btn-accent {
      background-color: var(--accent);
      border-color: var(--accent);
      color: #fff;
      border-radius: var(--radius);
    }
    .btn-primary:hover, .btn-accent:hover {
      background-color: #2d6de0;
      border-color: #2d6de0;
    }
    .btn-success {
      background-color: var(--green);
      border-color: var(--green);
      color: #000;
      border-radius: var(--radius);
    }
    .btn-success:hover { background-color: #00b091; border-color: #00b091; }
    .btn-dark, .btn-outline-secondary {
      border-radius: var(--radius);
    }
    .btn-outline-secondary {
      color: var(--muted);
      border-color: var(--border);
    }
    .btn-outline-secondary:hover {
      background-color: var(--surface2);
      color: var(--text);
      border-color: var(--border);
    }

    /* Formulários */
    .form-control, .form-select {
      background-color: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
    }
    .form-control:focus, .form-select:focus {
      background-color: var(--surface2);
      border-color: var(--accent);
      color: var(--text);
      box-shadow: 0 0 0 3px rgba(61,127,255,.2);
    }
    .form-control::placeholder { color: var(--muted); }

    /* Alertas / mensagens */
    .alert {
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .alert-info    { background-color: rgba(61,127,255,.12); color: #93c5fd; border-color: rgba(61,127,255,.3); }
    .alert-success { background-color: rgba(0,201,167,.12);  color: #6ee7d4; border-color: rgba(0,201,167,.3); }
    .alert-warning { background-color: rgba(240,167,50,.12); color: var(--warning); border-color: rgba(240,167,50,.3); }
    .alert-danger  { background-color: rgba(255,92,110,.12); color: #fca5a5; border-color: rgba(255,92,110,.3); }
    .btn-close { filter: invert(1) grayscale(1); }

    /* Stats cards */
    .stat-card { border-radius: var(--radius); }
    .stat-card .stat-value { font-size: 1.8rem; font-weight: 700; }
    .stat-card .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    /* Texto auxiliar */
    .text-muted { color: var(--muted) !important; }
    h4, h5 { color: var(--text); }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'documentos:lista' %}">
        <i class="bi bi-cpu"></i> DICAS
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="{% url 'documentos:upload' %}">
          <i class="bi bi-upload"></i> Novo Documento
        </a>
        <a class="nav-link" href="{% url 'documentos:lista' %}">
          <i class="bi bi-list-ul"></i> Documentos
        </a>
        <a class="nav-link" href="/admin/">
          <i class="bi bi-gear"></i> Admin
        </a>
      </div>
    </div>
  </nav>

  <div class="container mb-5">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
